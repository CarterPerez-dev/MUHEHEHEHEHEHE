# dev.conf
# Dev edge: SPA + Vite HMR on /, API on /api.

upstream merit_dev_api {
    server api:8000;
}

upstream merit_dev_frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # API -> FastAPI. Long timeouts: LLM evaluation can take a while.
    location /api/ {
        proxy_pass http://merit_dev_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Everything else -> Vite dev server (with HMR websocket).
    location / {
        proxy_pass http://merit_dev_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
